services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    ports:
      - "${PORT:-8200}:8200"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
    volumes:
      - duplicati-config:/config
      - duplicati-backups:/backups
      - /:/source:ro

volumes:
  duplicati-config:
  duplicati-backups:
