services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    ports:
      - "${PORT:-8384}:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
    volumes:
      - syncthing-config:/config
      - syncthing-data:/data

volumes:
  syncthing-config:
  syncthing-data:
