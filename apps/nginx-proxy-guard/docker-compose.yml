services:
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: npg-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nginx_proxy_guard
    command: postgres -c timezone=${TZ:-Asia/Seoul} -c log_timezone=${TZ:-Asia/Seoul} -c shared_preload_libraries=timescaledb -c timescaledb.telemetry_level=off
    volumes:
      - npg-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: npg-valkey
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - npg-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: svrforum/nginxproxyguard-api:latest
    container_name: npg-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      PORT: "8080"
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/nginx_proxy_guard?sslmode=disable
      REDIS_URL: redis://valkey:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production
      NGINX_CONTAINER: npg-proxy
      NGINX_STATUS_URL: "http://host.docker.internal:${NGINX_HTTP_PORT:-80}/nginx_status"
      NGINX_HTTP_PORT: ${NGINX_HTTP_PORT:-80}
      NGINX_HTTPS_PORT: ${NGINX_HTTPS_PORT:-443}
      API_HOST_PORT: "9080"
      API_HOST: "127.0.0.1:9080"
    ports:
      - "127.0.0.1:9080:8080"
    volumes:
      - npg-nginx:/etc/nginx:rw
      - npg-api:/app/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started

  ui:
    image: svrforum/nginxproxyguard-ui:latest
    container_name: npg-ui
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "${UI_PORT:-81}:443"
    volumes:
      - npg-ui:/app/ssl:rw
    depends_on:
      - api

  nginx:
    image: svrforum/nginxproxyguard-nginx:latest
    container_name: npg-proxy
    restart: always
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Seoul}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - npg-nginx:/etc/nginx:rw
    depends_on:
      - api

volumes:
  npg-postgres:
  npg-valkey:
  npg-nginx:
  npg-api:
  npg-ui:

networks:
  default:
    name: npg-network
