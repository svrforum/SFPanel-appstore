services:
  homarr:
    image: ghcr.io/ajnart/homarr:latest
    container_name: homarr
    restart: unless-stopped
    ports:
      - "${PORT:-7575}:7575"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - homarr-configs:/app/data/configs
      - homarr-icons:/app/public/icons
      - homarr-data:/data

volumes:
  homarr-configs:
  homarr-icons:
  homarr-data:
