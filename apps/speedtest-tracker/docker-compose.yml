services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    ports:
      - "${PORT:-8765}:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
      - APP_KEY=base64:${APP_KEY}
      - DB_CONNECTION=sqlite
    volumes:
      - speedtest-data:/config

volumes:
  speedtest-data:
