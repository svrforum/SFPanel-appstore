services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "51820:51820/udp"
      - "${UI_PORT:-51821}:51821/tcp"
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD=${PASSWORD}
    volumes:
      - wg-easy-data:/etc/wireguard

volumes:
  wg-easy-data:
